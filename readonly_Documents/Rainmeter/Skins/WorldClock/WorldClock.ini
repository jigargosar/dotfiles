; ============================================================
; World Clock — Warm Glass
; Frosted dark card with purple/amber warm tones
; Right-click context menu to change cities
; ============================================================

[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
ContextTitle=── City 1 ──
ContextTitle2=Mumbai (IST)
ContextAction2=[!WriteKeyValue Variables City1Name "Mumbai" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City1TZ "5.5" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City1Label "IST" "#CURRENTPATH#WorldClock.ini"][!Refresh]
ContextTitle3=New York (EST)
ContextAction3=[!WriteKeyValue Variables City1Name "New York" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City1TZ "-5" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City1Label "EST" "#CURRENTPATH#WorldClock.ini"][!Refresh]
ContextTitle4=London (GMT)
ContextAction4=[!WriteKeyValue Variables City1Name "London" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City1TZ "0" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City1Label "GMT" "#CURRENTPATH#WorldClock.ini"][!Refresh]
ContextTitle5=Tokyo (JST)
ContextAction5=[!WriteKeyValue Variables City1Name "Tokyo" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City1TZ "9" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City1Label "JST" "#CURRENTPATH#WorldClock.ini"][!Refresh]
ContextTitle6=Dubai (GST)
ContextAction6=[!WriteKeyValue Variables City1Name "Dubai" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City1TZ "4" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City1Label "GST" "#CURRENTPATH#WorldClock.ini"][!Refresh]
ContextTitle7=Sydney (AEST)
ContextAction7=[!WriteKeyValue Variables City1Name "Sydney" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City1TZ "10" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City1Label "AEST" "#CURRENTPATH#WorldClock.ini"][!Refresh]
ContextTitle8=Singapore (SGT)
ContextAction8=[!WriteKeyValue Variables City1Name "Singapore" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City1TZ "8" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City1Label "SGT" "#CURRENTPATH#WorldClock.ini"][!Refresh]
ContextTitle9=Berlin (CET)
ContextAction9=[!WriteKeyValue Variables City1Name "Berlin" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City1TZ "1" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City1Label "CET" "#CURRENTPATH#WorldClock.ini"][!Refresh]
ContextTitle10=── City 2 ──
ContextTitle11=Mumbai (IST)
ContextAction11=[!WriteKeyValue Variables City2Name "Mumbai" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City2TZ "5.5" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City2Label "IST" "#CURRENTPATH#WorldClock.ini"][!Refresh]
ContextTitle12=New York (EST)
ContextAction12=[!WriteKeyValue Variables City2Name "New York" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City2TZ "-5" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City2Label "EST" "#CURRENTPATH#WorldClock.ini"][!Refresh]
ContextTitle13=London (GMT)
ContextAction13=[!WriteKeyValue Variables City2Name "London" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City2TZ "0" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City2Label "GMT" "#CURRENTPATH#WorldClock.ini"][!Refresh]
ContextTitle14=Tokyo (JST)
ContextAction14=[!WriteKeyValue Variables City2Name "Tokyo" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City2TZ "9" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City2Label "JST" "#CURRENTPATH#WorldClock.ini"][!Refresh]
ContextTitle15=Dubai (GST)
ContextAction15=[!WriteKeyValue Variables City2Name "Dubai" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City2TZ "4" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City2Label "GST" "#CURRENTPATH#WorldClock.ini"][!Refresh]
ContextTitle16=Sydney (AEST)
ContextAction16=[!WriteKeyValue Variables City2Name "Sydney" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City2TZ "10" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City2Label "AEST" "#CURRENTPATH#WorldClock.ini"][!Refresh]
ContextTitle17=Singapore (SGT)
ContextAction17=[!WriteKeyValue Variables City2Name "Singapore" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City2TZ "8" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City2Label "SGT" "#CURRENTPATH#WorldClock.ini"][!Refresh]
ContextTitle18=Berlin (CET)
ContextAction18=[!WriteKeyValue Variables City2Name "Berlin" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City2TZ "1" "#CURRENTPATH#WorldClock.ini"][!WriteKeyValue Variables City2Label "CET" "#CURRENTPATH#WorldClock.ini"][!Refresh]

[Variables]
; ── Cities ──
City1Name=Mumbai
City1TZ=5.5
City1Label=IST
City2Name=New York
City2TZ=-5
City2Label=EST
; ── Dimensions ──
CardW=288
CardH=195
CardRadius=14
Pad=24
; ── Warm Glass Colors ──
; Card gradient: top-left warm dark, bottom-right cooler dark
CardBgTop=42,38,50,235
CardBgBot=28,26,34,242
; Border: white at very low opacity
CardBorder=255,255,255,18
; Top glow line: purple
GlowColor=180,140,255,46
; Divider
Divider=255,255,255,15
; Text: warm amber city names, white time, dim labels
CityColor=255,210,180,153
TimeColor=255,255,255,230
AmpmColor=180,140,255,140
LabelColor=255,255,255,51
DateColor=255,255,255,46
; ── Fonts ──
FontUI=Segoe UI Variable Display
FontMono=Cascadia Mono

; ============================================================
; MEASURES
; ============================================================

[MeasureTime1]
Measure=Time
Format=%#I:%M
TimeZone=#City1TZ#
DaylightSavingTime=0

[MeasureAMPM1]
Measure=Time
Format=%p
TimeZone=#City1TZ#
DaylightSavingTime=0

[MeasureDate1]
Measure=Time
Format=%a, %b %#d
TimeZone=#City1TZ#
DaylightSavingTime=0

[MeasureTime2]
Measure=Time
Format=%#I:%M
TimeZone=#City2TZ#
DaylightSavingTime=0

[MeasureAMPM2]
Measure=Time
Format=%p
TimeZone=#City2TZ#
DaylightSavingTime=0

[MeasureDate2]
Measure=Time
Format=%a, %b %#d
TimeZone=#City2TZ#
DaylightSavingTime=0

; ============================================================
; METERS
; ============================================================

; ── Card background with gradient fill ──
[MeterCard]
Meter=Shape
Shape=Rectangle 0,0,#CardW#,#CardH#,#CardRadius# | StrokeWidth 1 | Stroke Color #CardBorder# | Fill LinearGradient CardGrad
CardGrad=165 | #CardBgTop# ; 0.0 | #CardBgBot# ; 1.0

; ── Top edge glow line ──
[MeterGlow]
Meter=Shape
X=(#CardW# * 0.18)
Y=0
Shape=Rectangle 0,0,(#CardW# * 0.64),1 | StrokeWidth 0 | Fill LinearGradient GlowGrad
GlowGrad=90 | 0,0,0,0 ; 0.0 | #GlowColor# ; 0.5 | 0,0,0,0 ; 1.0

; ── City 1: Name ──
[MeterCity1Name]
Meter=String
X=#Pad#
Y=20
FontFace=#FontUI#
FontSize=11
FontWeight=500
FontColor=#CityColor#
AntiAlias=1
Text=#City1Name#

; ── City 1: TZ Label ──
[MeterCity1Label]
Meter=String
X=(#CardW# - #Pad#)
Y=0r
FontFace=#FontUI#
FontSize=9
FontColor=#LabelColor#
StringAlign=Right
AntiAlias=1
Text=#City1Label#

; ── City 1: Time ──
[MeterCity1Time]
Meter=String
MeasureName=MeasureTime1
X=#Pad#
Y=3R
FontFace=#FontMono#
FontSize=30
FontWeight=300
FontColor=#TimeColor#
AntiAlias=1
Text=%1

; ── City 1: AM/PM ──
[MeterCity1AMPM]
Meter=String
MeasureName=MeasureAMPM1
X=6R
Y=([MeterCity1Time:Y] + 22)
FontFace=#FontUI#
FontSize=9
FontWeight=500
FontColor=#AmpmColor#
AntiAlias=1
StringCase=Upper
DynamicVariables=1
Text=%1

; ── City 1: Date ──
[MeterCity1Date]
Meter=String
MeasureName=MeasureDate1
X=(#CardW# - #Pad#)
Y=([MeterCity1Time:Y] + 22)
FontFace=#FontUI#
FontSize=9
FontColor=#DateColor#
StringAlign=Right
AntiAlias=1
DynamicVariables=1
Text=%1

; ── Divider ──
[MeterDivider]
Meter=Shape
X=#Pad#
Y=8R
Shape=Rectangle 0,0,(#CardW# - #Pad# * 2),1 | StrokeWidth 0 | Fill LinearGradient DivGrad
DivGrad=90 | #Divider# ; 0.0 | 255,255,255,5 ; 1.0

; ── City 2: Name ──
[MeterCity2Name]
Meter=String
X=#Pad#
Y=10R
FontFace=#FontUI#
FontSize=11
FontWeight=500
FontColor=#CityColor#
AntiAlias=1
Text=#City2Name#

; ── City 2: TZ Label ──
[MeterCity2Label]
Meter=String
X=(#CardW# - #Pad#)
Y=0r
FontFace=#FontUI#
FontSize=9
FontColor=#LabelColor#
StringAlign=Right
AntiAlias=1
Text=#City2Label#

; ── City 2: Time ──
[MeterCity2Time]
Meter=String
MeasureName=MeasureTime2
X=#Pad#
Y=3R
FontFace=#FontMono#
FontSize=30
FontWeight=300
FontColor=#TimeColor#
AntiAlias=1
Text=%1

; ── City 2: AM/PM ──
[MeterCity2AMPM]
Meter=String
MeasureName=MeasureAMPM2
X=6R
Y=([MeterCity2Time:Y] + 22)
FontFace=#FontUI#
FontSize=9
FontWeight=500
FontColor=#AmpmColor#
AntiAlias=1
StringCase=Upper
DynamicVariables=1
Text=%1

; ── City 2: Date ──
[MeterCity2Date]
Meter=String
MeasureName=MeasureDate2
X=(#CardW# - #Pad#)
Y=([MeterCity2Time:Y] + 22)
FontFace=#FontUI#
FontSize=9
FontColor=#DateColor#
StringAlign=Right
AntiAlias=1
DynamicVariables=1
Text=%1
